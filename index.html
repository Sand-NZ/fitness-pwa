<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e" id="meta-theme-color">
  <meta name="description" content="健身实况记录 PWA — 自由训练与计划模式并存，自定义动作字段、标签、统计">
  <link rel="manifest" href="assets/manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <title>健身实况记录</title>
  <link rel="stylesheet" href="css/main.css?v=0.39">
  <link rel="stylesheet" href="css/components.css?v=0.39">
</head>
<body>
  <!-- ====== 训练页 ====== -->
  <section id="page-training" class="page active">
    <header class="page-header">
      <h1>🏋️ 训练</h1>
    </header>
    <div id="training-content" class="page-content">
      <!-- 空状态或训练视图由 JS 渲染 -->
    </div>
  </section>

  <!-- ====== 动作库页 ====== -->
  <section id="page-exercises" class="page">
    <header class="page-header">
      <h1>🏗️ 动作库</h1>
      <button class="btn btn-primary btn-sm" id="btn-add-exercise">+ 新建动作</button>
    </header>
    <div id="exercises-content" class="page-content"></div>
  </section>

  <!-- ====== 统计页 ====== -->
  <section id="page-stats" class="page">
    <header class="page-header">
      <h1>📊 统计</h1>
    </header>
    <div id="stats-content" class="page-content"></div>
  </section>

  <!-- ====== 设置页 ====== -->
  <section id="page-settings" class="page">
    <header class="page-header">
      <h1>⚙️ 设置</h1>
    </header>
    <div id="settings-content" class="page-content"></div>
  </section>

  <!-- ====== 底部导航栏 ====== -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-item active" data-page="training" aria-label="训练">
      <span class="nav-icon">🏋️</span>
      <span class="nav-label">训练</span>
    </button>
    <button class="nav-item" data-page="exercises" aria-label="动作库">
      <span class="nav-icon">🏗️</span>
      <span class="nav-label">动作库</span>
    </button>
    <button class="nav-item" data-page="stats" aria-label="统计">
      <span class="nav-icon">📊</span>
      <span class="nav-label">统计</span>
    </button>
    <button class="nav-item" data-page="settings" aria-label="设置">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">设置</span>
    </button>
  </nav>

  <!-- ====== 模态框容器 ====== -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="modal-container" class="modal-container hidden"></div>

  <!-- ====== Toast 通知 ====== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ====== 脚本加载 ====== -->
  <script src="js/models.js?v=0.39"></script>
  <script src="js/storage.js?v=0.39"></script>
  <script src="js/timer.js?v=0.39"></script>
  <script src="js/tags.js?v=0.39"></script>
  <script src="js/exercises.js?v=0.39"></script>
  <script src="js/records.js?v=0.39"></script>
  <script src="js/stats.js?v=0.39"></script>
  <script src="js/settings.js?v=0.39"></script>
  <script src="js/training.js?v=0.39"></script>
  <script src="js/backup.js?v=0.39"></script>
  <script src="js/ui.js?v=0.39"></script>
  <script src="js/app.js?v=0.39"></script>
</body>
</html>
